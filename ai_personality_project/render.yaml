services:
  - type: web
    name: emotional-ai-core
    env: docker
    plan: free
    region: frankfurt
    branch: main
    
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: emotional-ai-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: emotional-ai-db  
          property: port
      - key: DB_NAME
        fromDatabase:
          name: emotional-ai-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: emotional-ai-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: emotional-ai-db
          property: password
      - key: GCP_PROJECT_ID
        value: emotional-ai-project
      - key: GCP_LOCATION
        value: europe-west1
      - key: GCP_BUCKET_NAME
        value: emotional-ai-models
      - key: PYTHONPATH
        value: /app
    
    buildCommand: docker build -t emotional-ai .
    startCommand: python app.py
    
    healthCheckPath: /
    autoDeploy: true

databases:
  - name: emotional-ai-db
    plan: free
    region: frankfurt
    databaseName: emotional_ai_db
    user: emotional_ai_db_user