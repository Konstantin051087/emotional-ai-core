# AI Personality Project - Конфигурация развертывания на Render
# Фаза 1: Проектирование и определение концепции

services:
  - type: web
    name: ai-personality-phase1
    env: python
    plan: free
    region: frankfurt
    branch: main
    
    # Build Configuration
    buildCommand: |
      echo "🚀 Начало сборки AI Personality Project - Фаза 1"
      python -m pip install --upgrade pip
      pip install -r requirements.txt
      echo "✅ Зависимости установлены"
      echo "🔍 Проверка структуры проекта..."
      ls -la
      echo "🧪 Запуск тестов..."
      python test_huggingface.py
      echo "🎉 Сборка завершена успешно"
    
    # Start Configuration  
    startCommand: python app.py
    
    # Environment Variables
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: RENDER
        value: true
      - key: PROJECT_PHASE
        value: "1"
      - key: HF_SPACE_URL
        value: https://huggingface.co/spaces/your-username/ai-personality-demo
    
    # Health Check
    healthCheckPath: /
    healthCheckTimeout: 300
    
    # Auto Deployment
    autoDeploy: true
    
    # Resource Configuration
    resources:
      cpu: 1
      memory: 1GB
      disk: 1GB
    
    # Network Configuration
    ports:
      - port: 5000
        protocol: HTTP
    
    # Security Headers
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block

# Build Filter for CI/CD
buildFilter:
  paths:
    - app.py
    - emotional_model.py
    - character_profile.json
    - requirements.txt
    - render.yaml
    - test_huggingface.py
    - profile_validator.py

# System Requirements
system:
  python:
    version: 3.11.0
  node:
    version: 18

# Dependencies Cache
cache:
  paths:
    - ~/.cache/pip
    - ~/.cache/torch
    - ~/.cache/huggingface

# Deployment Hooks
hooks:
  preBuild: |
    echo "🔧 Предварительная настройка среды..."
    python --version
    pip --version
  postBuild: |
    echo "📦 Построение завершено"
    echo "🔍 Проверка установленных пакетов..."
    pip list
  preDeploy: |
    echo "🚀 Подготовка к деплою..."
    python -c "import sys; print(f'Python path: {sys.path}')"
  postDeploy: |
    echo "🎉 Деплой завершен успешно!"
    echo "📊 Приложение доступно по URL"

# Monitoring and Logging
logging:
  enabled: true
  level: info

# Scaling (for future phases)
scaling:
  minInstances: 1
  maxInstances: 1
  targetMemoryPercent: 80
  targetCPUPercent: 80