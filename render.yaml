services:
  - type: web
    name: emotional-orchestrator
    env: python
    plan: free
    buildCommand: cd orchestrator && pip install -r requirements.txt
    startCommand: cd orchestrator && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: emotional-ai-db
          property: connectionString
      - key: EMOTION_MODULE_URL
        value: https://emotion-module.onrender.com
      - key: PERSONALITY_MODULE_URL
        value: https://personality-module.onrender.com
  - type: web
    name: emotion-module
    env: python
    plan: free
    buildCommand: cd modules/emotion_analyzer && pip install -r requirements.txt
    startCommand: cd modules/emotion_analyzer && uvicorn app:app --host 0.0.0.0 --port $PORT
  - type: web
    name: personality-module
    env: python
    plan: free
    buildCommand: cd modules/personality_engine && pip install -r requirements.txt
    startCommand: cd modules/personality_engine && uvicorn app:app --host 0.0.0.0 --port $PORT